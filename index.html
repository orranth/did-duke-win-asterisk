<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Did Duke Win?*</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* The giant text */
        h1 {
            font-size: 15vw; /* Scales with the screen size */
            margin: 0;
            text-transform: uppercase;
        }

        /* The tongue-in-cheek footnote */
        p {
            font-size: 2vw;
            margin-top: 20px;
            color: #555555;
            text-align: center;
            padding: 0 20px;
        }

        /* Mobile adjustments for the footnote */
        @media (max-width: 600px) {
            p {
                font-size: 4vw;
            }
        }
    </style>
</head>
<body>

    <h1>YES*</h1>

    <p>* Technically speaking. But Caleb...?</p>

</body>
</html>
